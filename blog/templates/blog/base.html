<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Meu Site{% endblock %}</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 0; padding: 0;
        }
        
        header, footer {
            background: #f5f7fa;
            padding: 16px;
            text-align: center;
        }
        
        main {
            padding: 24px;
            min-height: 60vh;
        }

        .link-stack {
            text-align: center;
            margin-top: 16px;
        }

        .link-stack a {
            display: block;
            margin: 6px 0;
            text-decoration: none;
            color: blue;
            font-size: 18px;
        }

        .link-stack a:hover {
            text-decoration: underline;
        }
    </style>
    
</head>
<body>
    <header>
        <h1>Aplicação Django - Blog</h1>
        <nav class="link-stack">
            <a href="{% url 'home' %}">Página Inicial</a>
            <a href="{% url 'contact' phone_number='83 988776655' %}">Contato</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <small>© {{ current_year|default:"2026" }} - felipecartaxo@gmail.com</small>
    </footer>
</body>
</html>
