<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Css para exibir a tabela de um jeito mais agradável -->
     <style>
        table {
            border-collapse: collapse;
            border: 2px solid rgb(140 140 140);
            font-family: sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        caption {
            caption-side: bottom;
            padding: 10px;
            font-weight: bold;
        }

        thead,
        tfoot {
            background-color: rgb(228 240 245);
        }

        th,
        td {
            border: 1px solid rgb(160 160 160);
            padding: 8px 10px;
        }

        td:last-of-type {
            text-align: center;
        }

        tbody>tr:nth-of-type(even) {
            background-color: rgb(237 238 242);
        }

        tfoot th {
            text-align: right;
        }

        tfoot td {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1) Variáveis no template -->
    <h1>Olá, {{ username }}, a data atual é {{ current_date }}.</h1>

    <!-- 2) Condicionais -->
    {% if is_logged_in %}
    <h2>Bem vindo de volta!</h2>
    {% else %}
    <h2>Faça login para continuar.</h2>
    {% endif %}
    <hr>

    <!-- 3) Loops -->
    <h2>Seus produtos:</h2>
    <table style="border: 2px solid rgb(140 140 140);">
        <thead>
            <tr>
                <th>Produtos</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td> {{ p.name }} </td>
                <td> {{ p.price }} </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
</body>
</html>
