{% extends "edu/base.html" %}
{% block title %}Excluir Publicação{% endblock %}
{% block content %}
<h2>Excluir Publicação</h2>
<p>Deseja realmente excluir o vínculo: <strong>{{ obj }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar</button>
    <a class="btn" href="{% url 'publica_list' %}">Cancelar</a>
</form>
{% endblock %}
