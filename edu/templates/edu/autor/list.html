{% extends "edu/base.html" %}
{% block title %}Autores{% endblock %}
{% block content %}
<h2>Autores</h2>
<a class="btn" href="{% url 'autor_create' %}">Novo Autor</a>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
    {% for autor in autores %}
        <tr>
            <td>{{ autor.id }}</td>
            <td>{{ autor.nome }}</td>
            <td>
                <a class="btn" href="{% url 'autor_update' autor.id %}">Editar</a>
                <a class="btn" href="{% url 'autor_delete' autor.id %}">Excluir</a>
            </td>
        </tr>
    {% empty %}
        <tr><td colspan="3">Nenhum autor cadastrado.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
