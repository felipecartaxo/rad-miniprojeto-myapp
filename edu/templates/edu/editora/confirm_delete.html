{% extends "edu/base.html" %}
{% block title %}Excluir Editora{% endblock %}
{% block content %}
<h2>Excluir Editora</h2>
<p>Deseja realmente excluir: <strong>{{ obj }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar</button>
    <a class="btn" href="{% url 'editora_list' %}">Cancelar</a>
</form>
{% endblock %}
