{% extends "edu/base.html" %}
{% block title %}Excluir Livro{% endblock %}
{% block content %}
<h2>Excluir Livro</h2>
<p>Deseja realmente excluir: <strong>{{ obj }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar</button>
    <a class="btn" href="{% url 'livro_list' %}">Cancelar</a>
</form>
{% endblock %}
